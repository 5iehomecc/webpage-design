<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>经典扫雷复刻</title>
<style>
  /* 布局与工具栏 */
  body { background: #c0c0c0; font-family: Arial, sans-serif; text-align: center; }
  #toolbar { margin: 20px; }
  #mineCount, #timer {
    width: 50px; height: 30px; background: black; color: red;
    font-family: 'Courier New', monospace; font-size: 24px;
    text-align: center; line-height: 30px; display: inline-block;
    border: 2px inset #808080;
  }
  #face {
    width: 30px; height: 30px;
    text-align: center; font-size: 24px; cursor: pointer;
    border: 2px outset #ffffff;
    display: inline-block;
    vertical-align: middle;
  }
  /* 游戏网格 */
  #board { display: inline-block; }
  .cell {
    width: 20px; height: 20px; line-height: 20px; text-align: center;
    font-weight: bold; font-size: 14px; user-select: none;
    background: #C0C0C0;
    border-top:    1px solid #ffffff;
    border-left:   1px solid #ffffff;
    border-right:  1px solid #808080;
    border-bottom: 1px solid #808080;
    float: left;
    cursor: default;
  }
  .cell.revealed {
    background: #E0E0E0;
    border: 1px solid #808080;
    cursor: default;
  }
  /* 数字颜色 (模拟 WinXP) */
  .num1 { color: #0000FF; } /* 蓝 */
  .num2 { color: #008000; } /* 绿 */
  .num3 { color: #FF0000; } /* 红 */
  .num4 { color: #00008B; } /* 深蓝 */
  .num5 { color: #800000; } /* 栗色 */
  .num6 { color: #008080; } /* 青 */
  .num7 { color: #000000; } /* 黑 */
  .num8 { color: #808080; } /* 灰 */
  .flag { color: red; }    /* 错误旗标✘颜色 */
</style>
</head>
<body>
<div id="toolbar">
  <div id="mineCount">000</div>
  <div id="face">😀</div>
  <div id="timer">000</div>
</div>
<div id="board"></div>

<script>
// ==== 初始化游戏参数 ====
const LEVELS = {
  '初级': {rows: 9, cols: 9, mines: 10},
  '中级': {rows: 16, cols: 16, mines: 40},
  '高级': {rows: 16, cols: 30, mines: 99},
};
let rows = LEVELS['中级'].rows;
let cols = LEVELS['中级'].cols;
let mineCount = LEVELS['中级'].mines;

let boardElem = document.getElementById('board');
let mineCountElem = document.getElementById('mineCount');
let timerElem = document.getElementById('timer');
let faceElem = document.getElementById('face');

let cells = [];        // 二维数组记录每个格子的对象
let firstClick = true;
let timer = null;
let elapsed = 0;
let revealedCount = 0;

// 更新雷数显示
function updateMineCount() {
  const flags = document.querySelectorAll('.cell.flagged').length;
  let remaining = mineCount - flags;
  mineCountElem.textContent = String(remaining).padStart(3, '0');
}

// 更新计时显示
function updateTimer() {
  timerElem.textContent = String(elapsed).padStart(3, '0');
}

// 重置游戏
function initGame() {
  // 重置状态
  firstClick = true;
  elapsed = 0;
  clearInterval(timer);
  timerElem.textContent = '000';
  faceElem.textContent = '😀';
  boardElem.innerHTML = '';
  cells = [];
  revealedCount = 0;
  
  // 创建格子
  for (let i = 0; i < rows; i++) {
    cells[i] = [];
    for (let j = 0; j < cols; j++) {
      let cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = i; cell.dataset.col = j;
      // 事件绑定
      cell.onclick = onCellClick;
      cell.oncontextmenu = onCellRightClick;
      cell.ondblclick = onCellDblClick;
      cell.addEventListener('mousedown', onCellMouseDown);
      boardElem.appendChild(cell);
      cells[i][j] = {elem: cell, isMine: false, isRevealed: false};
    }
    // 每行结束后换行
    let br = document.createElement('div');
    br.style.clear = 'both';
    boardElem.appendChild(br);
  }
  mineCountElem.textContent = String(mineCount).padStart(3, '0');
}

// 随机生成雷区（首次点击后调用）
function generateMines(excludeRow, excludeCol) {
  let options = [];
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      // 排除点击格周围的一圈（可选），这里只排除点击格本身
      if (i === excludeRow && j === excludeCol) continue;
      options.push({r: i, c: j});
    }
  }
  // 随机取样放置 mineCount 个雷
  for (let k = 0; k < mineCount; k++) {
    const idx = Math.floor(Math.random() * options.length);
    let pos = options.splice(idx, 1)[0];
    cells[pos.r][pos.c].isMine = true;
  }
}

// 计算某格周围雷数
function countAdjMines(r, c) {
  let count = 0;
  for (let di = -1; di <= 1; di++) {
    for (let dj = -1; dj <= 1; dj++) {
      if (di === 0 && dj === 0) continue;
      let nr = r + di, nc = c + dj;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        if (cells[nr][nc].isMine) count++;
      }
    }
  }
  return count;
}

// 翻开格子逻辑
function revealCell(r, c) {
  let cellObj = cells[r][c];
  let cellElem = cellObj.elem;
  if (cellObj.isRevealed || cellElem.classList.contains('flagged')) return;
  cellObj.isRevealed = true;
  cellElem.classList.add('revealed');
  revealedCount++;
  // 若是雷
  if (cellObj.isMine) {
    cellElem.textContent = '💣';
    cellElem.style.color = 'red';
    gameOver(false, r, c);
    return;
  }
  // 计算周围雷数
  let cnt = countAdjMines(r, c);
  if (cnt > 0) {
    cellElem.textContent = cnt;
    cellElem.classList.add('num'+cnt);
  } else {
    cellElem.textContent = '';
    // 递归展开周围
    for (let di = -1; di <= 1; di++) {
      for (let dj = -1; dj <= 1; dj++) {
        let nr = r + di, nc = c + dj;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          if (!(di === 0 && dj === 0)) {
            revealCell(nr, nc);
          }
        }
      }
    }
  }
  // 每次翻开后检查胜利
  if (revealedCount === rows * cols - mineCount) {
    gameOver(true);
  }
}

// 右键标旗处理
function onCellRightClick(e) {
  e.preventDefault();
  let cell = e.currentTarget;
  if (cell.classList.contains('revealed')) return;
  if (cell.classList.contains('flagged')) {
    cell.classList.remove('flagged');
    cell.textContent = '';
  } else {
    cell.classList.add('flagged');
    cell.textContent = '🚩';
  }
  updateMineCount();
}

// 左键点击处理
function onCellClick(e) {
  let cell = e.currentTarget;
  let r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
  if (firstClick) {
    // 首次点击时生成雷区
    generateMines(r, c);
    firstClick = false;
    // 启动计时器
    timer = setInterval(() => { elapsed++; updateTimer(); }, 1000);
  }
  // 如果已经标旗则忽略
  if (cell.classList.contains('flagged')) return;
  // 正常翻开
  revealCell(r, c);
}

// 双击触发 Chording
function onCellDblClick(e) {
  let cell = e.currentTarget;
  let r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
  let cellObj = cells[r][c];
  if (!cellObj.isRevealed) return;
  // 计算周围旗子数
  let flagCount = 0;
  for (let di = -1; di <= 1; di++) {
    for (let dj = -1; dj <= 1; dj++) {
      let nr = r + di, nc = c + dj;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        if (cells[nr][nc].elem.classList.contains('flagged')) {
          flagCount++;
        }
      }
    }
  }
  // 如果旗子数等于数字，翻开其余邻居
  let cnt = parseInt(cell.textContent) || 0;
  if (flagCount === cnt) {
    for (let di = -1; di <= 1; di++) {
      for (let dj = -1; dj <= 1; dj++) {
        let nr = r + di, nc = c + dj;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          if (!cells[nr][nc].elem.classList.contains('flagged')) {
            revealCell(nr, nc);
          }
        }
      }
    }
  }
}

// 同时按下左右键触发 Chording（备用检测）
function onCellMouseDown(e) {
  if (e.buttons === 3) { // 左右键同时按下
    onCellDblClick(e);
  }
}

// 游戏结束处理（win: true/false）
function gameOver(win, bombR, bombC) {
  clearInterval(timer);
  if (win) {
    faceElem.textContent = '😎';
    // 可选：自动插旗显示所有雷
    // [...document.querySelectorAll('.cell')].forEach(cell => {
    //   if (cells[cell.dataset.row][cell.dataset.col].isMine) {
    //     cell.textContent = '🚩';
    //   }
    // });
  } else {
    faceElem.textContent = '😵';
    // 显示所有雷和错误标记
    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        let obj = cells[i][j], elem = obj.elem;
        if (obj.isMine) {
          // 未插旗的雷显示💣
          if (!elem.classList.contains('flagged')) {
            elem.textContent = '💣';
          }
          // 如果是踩中的雷，高亮显示
          if (i === bombR && j === bombC) {
            elem.style.color = 'red';
          }
        } else {
          // 错误插旗的位置显示✘
          if (elem.classList.contains('flagged')) {
            elem.textContent = '✘'; elem.classList.add('flagged', 'revealed');
            elem.style.color = 'red';
          }
        }
      }
    }
  }
  // 禁用所有点击
  document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = null; cell.oncontextmenu = null;
    cell.ondblclick = null; cell.onmousedown = null;
  });
}

// 启动游戏
initGame();
</script>

</body>
</html>
