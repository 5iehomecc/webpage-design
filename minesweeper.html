<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#004643;
  --bg-deep:#001e1d;
  --headline:#fffffe;
  --paragraph:#abd1c6;
  --button:#f9bc60;
  --button-text:#001e1d;
  --card-bg:#e8e4e6;
  --card-heading:#001e1d;
  --card-paragraph:#004643;
  --highlight:#f9bc60;
  --tertiary:#e16162;
  --secondary:#abd1c6;
  --stroke:#001e1d;
  --main:#e8e4e6;
}

html,body{
  height:100%;overflow-x:hidden;overflow-y:auto;
}

body{
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  user-select:none;-webkit-user-select:none;
  padding:.5rem;
  gap:.5rem;
}

.window{
  background:var(--card-bg);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,30,29,0.4),0 2px 8px rgba(0,0,0,0.2);
  max-width:96vw;
  display:flex;flex-direction:column;
}

.title-bar{
  background:var(--bg-deep);
  color:var(--headline);
  padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.title-bar-text{
  font-family:'Press Start 2P',monospace;
  font-size:.6rem;
  letter-spacing:1px;
  color:var(--highlight);
  font-weight:900;
  white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.title-bar-text .mine-ico{font-size:1rem;line-height:1}
.level-btns{
  display:flex;gap:6px;
}
.level-btn{
  display:inline-block;
  background:var(--bg);
  color:var(--highlight);
  padding:2px 10px;
  border-radius:4px;
  font-size:.7rem;
  font-weight:900;
  cursor:pointer;
  transition:all .15s;
  border:none;
  letter-spacing:1px;
}
.level-btn:hover{background:var(--highlight);color:var(--bg-deep)}
.level-btn.active{background:var(--highlight);color:var(--bg-deep)}

.info-bar{
  padding:6px 14px;
  background:var(--main);
  border-bottom:2px solid rgba(0,30,29,0.1);
  display:flex;align-items:center;justify-content:center;gap:16px;
  flex-wrap:wrap;
}
.info-item{
  font-size:.8rem;
  font-weight:700;
  color:var(--card-heading);
  display:flex;align-items:center;gap:4px;
}
.info-item .key{
  display:inline-block;
  background:var(--bg);
  color:var(--highlight);
  padding:1px 8px;
  border-radius:4px;
  font-size:.7rem;
  font-weight:900;
}

.game-area{padding:8px 10px 10px}

.panel{
  background:var(--main);
  border-radius:8px;
  padding:8px 12px;
  margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  border:2px solid rgba(0,30,29,0.08);
}

.counter{
  background:var(--bg-deep);color:var(--tertiary);
  font-family:'Consolas','Courier New',monospace;
  font-size:28px;font-weight:900;
  width:58px;height:36px;
  display:flex;align-items:center;justify-content:center;
  letter-spacing:3px;
  border-radius:6px;
  padding:2px 4px;
  border:2px solid rgba(0,30,29,0.3);
}
.counter span{display:inline-block;min-width:12px;text-align:center}

.face-btn{
  width:40px;height:40px;
  background:var(--card-bg);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  border-radius:8px;
  border:2px solid rgba(0,30,29,0.1);
  transition:all .15s;
}
.face-btn:hover{background:var(--highlight);transform:scale(1.05)}
.face-btn:active{transform:scale(0.95)}

.grid-wrap{
  border-radius:8px;
  overflow:hidden;
  border:3px solid rgba(0,30,29,0.12);
  background:var(--main);
}

.grid{display:grid;gap:0}

.cell{
  background:#c7c2c4;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
  cursor:default;line-height:1;position:relative;
  border:2px solid;
  border-color:#f5f3f4 #8a8587 #8a8587 #f5f3f4;
  transition:background .08s;
}
.cell.revealed{
  border:1px solid rgba(0,30,29,0.12);
  background:var(--main);
}
.cell.pressed{
  border:1px solid rgba(0,30,29,0.12);
  background:var(--main);
}
.cell.mine-hit{background:var(--tertiary) !important}
.cell.flag-wrong{background:var(--main)}
.cell.flag-wrong .cross::after,.cell.flag-wrong .cross::before{
  content:'';position:absolute;background:var(--tertiary);border-radius:2px;
}
.cell.flag-wrong .cross::after{transform:rotate(45deg)}
.cell.flag-wrong .cross::before{transform:rotate(-45deg)}

.n1{color:#3b82f6}.n2{color:#22c55e}.n3{color:var(--tertiary)}.n4{color:#7c3aed}
.n5{color:#b91c1c}.n6{color:#0d9488}.n7{color:var(--bg-deep)}.n8{color:#9ca3af}

.mine-icon,.flag-icon,.question-icon{font-weight:900}
.question-icon{color:var(--bg-deep);font-weight:900}

.footer{
  text-align:center;
  padding:.5rem 1rem;
  color:var(--secondary);
  font-size:.75rem;
  font-weight:400;
  letter-spacing:.5px;
  transition:all .2s;
  white-space:nowrap;
}
.footer a{
  color:var(--highlight);
  text-decoration:none;
  font-weight:400;
  transition:all .2s;
}
.footer a:hover{
  font-weight:900;
}
.footer:hover{
  font-weight:700;
}

@media(max-width:700px){
  body{padding:.3rem}
  .title-bar{padding:6px 10px;gap:8px}
  .title-bar-text{font-size:.45rem}
  .level-btn{font-size:.6rem;padding:1px 6px}
  .info-bar{padding:4px 10px;gap:10px}
  .info-item{font-size:.7rem}
  .info-item .key{font-size:.6rem;padding:1px 5px}
  .counter{font-size:22px;width:48px;height:30px}
  .face-btn{width:34px;height:34px;font-size:18px}
}
</style>
</head>
<body>

<div class="window" id="window">
  <div class="title-bar">
    <div class="title-bar-text"><span class="mine-ico">💣</span>MINESWEEPER</div>
    <div class="level-btns">
      <button class="level-btn active" id="btnBeginner" onclick="setLevel('beginner')">初级</button>
      <button class="level-btn" id="btnIntermediate" onclick="setLevel('intermediate')">中级</button>
      <button class="level-btn" id="btnExpert" onclick="setLevel('expert')">高级</button>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-item"><span class="key">左键</span> 揭开</div>
    <div class="info-item"><span class="key">右键</span> 标旗</div>
    <div class="info-item"><span class="key">双键</span> 验证</div>
  </div>

  <div class="game-area">
    <div class="panel">
      <div class="counter" id="mineCount"><span>0</span><span>1</span><span>0</span></div>
      <div class="face-btn" id="faceBtn" onmousedown="faceDown()" onmouseup="faceUp()" onclick="newGame()">🙂</div>
      <div class="counter" id="timer"><span>0</span><span>0</span><span>0</span></div>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div class="footer">Copyright &copy; <a href="https://www.5iehome.cc" target="_blank">E家分享</a></div>

<script>
const LEVELS={
  beginner:{rows:9,cols:9,mines:10},
  intermediate:{rows:16,cols:16,mines:40},
  expert:{rows:16,cols:30,mines:99}
};

let level='beginner',rows,cols,mineTotal;
let board,revealed,flagged,mines;
let gameOver,gameWon,firstClick,timerVal,timerInterval,useMarks=true;
let leftDown=false,rightDown=false,chording=false;

function calcCellSize(){
  const vh=window.innerHeight;
  const vw=window.innerWidth;
  const isMobile=vw<=700;
  const titleH=isMobile?32:40;
  const infoH=isMobile?28:34;
  const gamePad=isMobile?16:18;
  const panelH=isMobile?46:52;
  const gridBorder=6;
  const pagePad=isMobile?12:16;
  const footerH=isMobile?30:36;
  const availH=vh-titleH-infoH-gamePad-panelH-gridBorder-pagePad-footerH;
  const availW=vw-48;
  const maxByH=Math.floor(availH/rows);
  const maxByW=Math.floor(availW/cols);
  let sz=Math.min(maxByH,maxByW);
  sz=Math.max(sz,18);
  sz=Math.min(sz,40);
  return sz;
}

function setLevel(l){
  level=l;updateLevelMenu();newGame();
}
function updateLevelMenu(){
  document.getElementById('btnBeginner').className='level-btn'+(level==='beginner'?' active':'');
  document.getElementById('btnIntermediate').className='level-btn'+(level==='intermediate'?' active':'');
  document.getElementById('btnExpert').className='level-btn'+(level==='expert'?' active':'');
}

function newGame(){
  const cfg=LEVELS[level];
  rows=cfg.rows;cols=cfg.cols;mineTotal=cfg.mines;
  board=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(0));
  mines=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false;gameWon=false;firstClick=true;
  clearInterval(timerInterval);timerVal=0;timerInterval=null;
  updateMineCount();updateTimer();setFace('🙂');
  buildGrid();
}

function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  const sz=calcCellSize();
  g.style.gridTemplateColumns=`repeat(${cols},${sz}px)`;
  const fontSize=Math.max(10,Math.floor(sz*0.5));
  const iconSize=Math.max(10,Math.floor(sz*0.55));
  const crossW=Math.max(10,sz-10);
  const crossH=Math.max(2,Math.floor(sz*0.09));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.style.width=sz+'px';
      cell.style.height=sz+'px';
      cell.style.fontSize=fontSize+'px';
      cell.dataset.r=r;cell.dataset.c=c;
      cell.dataset.sz=sz;
      cell.addEventListener('mousedown',onMouseDown);
      cell.addEventListener('mouseup',onMouseUp);
      cell.addEventListener('mouseover',onMouseOver);
      cell.addEventListener('mouseout',onMouseOut);
      cell.addEventListener('contextmenu',e=>e.preventDefault());
      g.appendChild(cell);
    }
  }
  document.documentElement.style.setProperty('--cell-sz',sz+'px');
  document.documentElement.style.setProperty('--icon-sz',iconSize+'px');
  document.documentElement.style.setProperty('--font-sz',fontSize+'px');
  document.documentElement.style.setProperty('--cross-w',crossW+'px');
  document.documentElement.style.setProperty('--cross-h',crossH+'px');
}

function getCell(r,c){return document.getElementById('grid').children[r*cols+c]}

function placeMines(safeR,safeC){
  let placed=0;
  while(placed<mineTotal){
    const r=Math.floor(Math.random()*rows);
    const c=Math.floor(Math.random()*cols);
    if(mines[r][c])continue;
    if(Math.abs(r-safeR)<=1&&Math.abs(c-safeC)<=1)continue;
    mines[r][c]=true;placed++;
  }
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(mines[r][c]){board[r][c]=-1;continue;}
      let cnt=0;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&mines[nr][nc])cnt++;
      }
      board[r][c]=cnt;
    }
  }
}

function onMouseDown(e){
  e.preventDefault();
  if(gameOver||gameWon)return;
  const r=+this.dataset.r,c=+this.dataset.c;
  if(e.button===0)leftDown=true;
  if(e.button===2)rightDown=true;

  if(e.button===2&&!leftDown){
    handleRightClick(r,c);
    return;
  }
  if(e.button===0&&!rightDown){
    if(!revealed[r][c]&&flagged[r][c]!==1){
      setFace('😮');
      getCell(r,c).classList.add('pressed');
    }
  }
  if(leftDown&&rightDown){
    chording=true;
    pressAround(r,c);
  }
}

function onMouseUp(e){
  if(gameOver||gameWon)return;
  const r=+this.dataset.r,c=+this.dataset.c;

  if(e.button===0)leftDown=false;
  if(e.button===2)rightDown=false;

  if(chording&&!(leftDown&&rightDown)){
    chording=false;
    unpressAll();
    if(revealed[r][c]&&board[r][c]>0){
      chordClick(r,c);
    }
    return;
  }

  if(e.button===0&&!rightDown){
    unpressAll();
    if(!revealed[r][c]&&flagged[r][c]!==1){
      handleLeftClick(r,c);
    }
    if(!gameOver&&!gameWon)setFace('🙂');
  }
}

function onMouseOver(e){
  if(gameOver||gameWon)return;
  const r=+this.dataset.r,c=+this.dataset.c;
  if(leftDown&&!rightDown&&!revealed[r][c]&&flagged[r][c]!==1){
    getCell(r,c).classList.add('pressed');
  }
  if(leftDown&&rightDown){
    pressAround(r,c);
  }
}

function onMouseOut(e){
  if(gameOver||gameWon)return;
  const r=+this.dataset.r,c=+this.dataset.c;
  if(leftDown&&!rightDown){
    getCell(r,c).classList.remove('pressed');
  }
  if(leftDown&&rightDown){
    unpressAround(r,c);
  }
}

function pressAround(r,c){
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!revealed[nr][nc]&&flagged[nr][nc]!==1){
      getCell(nr,nc).classList.add('pressed');
    }
  }
}
function unpressAround(r,c){
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)getCell(nr,nc).classList.remove('pressed');
  }
}
function unpressAll(){
  document.querySelectorAll('.cell.pressed').forEach(c=>c.classList.remove('pressed'));
}

function handleLeftClick(r,c){
  if(firstClick){
    placeMines(r,c);
    firstClick=false;
    startTimer();
  }
  if(mines[r][c]){
    gameOver=true;
    clearInterval(timerInterval);
    revealAllMines(r,c);
    setFace('😵');
    return;
  }
  revealCell(r,c);
  checkWin();
}

function handleRightClick(r,c){
  if(revealed[r][c])return;
  if(useMarks){
    flagged[r][c]=(flagged[r][c]+1)%3;
  }else{
    flagged[r][c]=flagged[r][c]===1?0:1;
  }
  renderCell(r,c);
  updateMineCount();
}

function chordClick(r,c){
  let flagCount=0;
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&flagged[nr][nc]===1)flagCount++;
  }
  if(flagCount!==board[r][c])return;

  let hitMine=false;
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
    if(revealed[nr][nc]||flagged[nr][nc]===1)continue;
    if(mines[nr][nc]){
      hitMine=true;
      gameOver=true;
      clearInterval(timerInterval);
      revealAllMines(nr,nc);
    }else{
      revealCell(nr,nc);
    }
  }
  if(hitMine){setFace('😵');return;}
  checkWin();
}

function revealCell(r,c){
  if(r<0||r>=rows||c<0||c>=cols)return;
  if(revealed[r][c]||flagged[r][c]===1)return;
  revealed[r][c]=true;
  renderCell(r,c);
  if(board[r][c]===0){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0)continue;
      revealCell(r+dr,c+dc);
    }
  }
}

function revealAllMines(hitR,hitC){
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(mines[r][c]&&!flagged[r][c]){
        revealed[r][c]=true;
        const cell=getCell(r,c);
        cell.className='cell revealed'+(r===hitR&&c===hitC?' mine-hit':'');
        cell.innerHTML='<span class="mine-icon">💣</span>';
        const isz=cell.dataset.sz?Math.floor(cell.dataset.sz*0.55):18;
        cell.querySelector('.mine-icon').style.fontSize=isz+'px';
      }
      if(!mines[r][c]&&flagged[r][c]===1){
        const cell=getCell(r,c);
        cell.className='cell revealed flag-wrong';
        cell.innerHTML='<span class="cross"></span>';
        const cw=cell.dataset.sz?cell.dataset.sz-10:22;
        const ch=cell.dataset.sz?Math.floor(cell.dataset.sz*0.09):3;
        const cross=cell.querySelector('.cross');
        cross.style.width=cw+'px';cross.style.height=ch+'px';
      }
    }
  }
}

function checkWin(){
  let unrevealed=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!revealed[r][c])unrevealed++;
  if(unrevealed===mineTotal){
    gameWon=true;
    clearInterval(timerInterval);
    setFace('😎');
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      if(mines[r][c]&&flagged[r][c]!==1){
        flagged[r][c]=1;
        renderCell(r,c);
      }
    }
    updateMineCount();
  }
}

function renderCell(r,c){
  const cell=getCell(r,c);
  const sz=cell.dataset.sz?+cell.dataset.sz:32;
  const fs=Math.max(10,Math.floor(sz*0.5));
  const isz=Math.max(10,Math.floor(sz*0.55));
  if(revealed[r][c]){
    cell.className='cell revealed';
    if(board[r][c]===-1){
      cell.innerHTML=`<span class="mine-icon" style="font-size:${isz}px">💣</span>`;
    }else if(board[r][c]>0){
      cell.innerHTML=`<span class="n${board[r][c]}" style="font-size:${fs}px">${board[r][c]}</span>`;
    }else{
      cell.innerHTML='';
    }
  }else{
    cell.className='cell';
    if(flagged[r][c]===1){
      cell.innerHTML=`<span class="flag-icon" style="font-size:${isz}px">🚩</span>`;
    }else if(flagged[r][c]===2){
      cell.innerHTML=`<span class="question-icon" style="font-size:${fs}px">?</span>`;
    }else{
      cell.innerHTML='';
    }
  }
}

function updateMineCount(){
  let flagCount=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(flagged[r][c]===1)flagCount++;
  let val=mineTotal-flagCount;
  if(val<0)val=-val;
  const s=String(val).padStart(3,'0');
  if(mineTotal-flagCount<0){
    document.getElementById('mineCount').innerHTML=`<span>-</span><span>${s[1]}</span><span>${s[2]}</span>`;
  }else{
    document.getElementById('mineCount').innerHTML=`<span>${s[0]}</span><span>${s[1]}</span><span>${s[2]}</span>`;
  }
}

function updateTimer(){
  const s=String(Math.min(timerVal,999)).padStart(3,'0');
  document.getElementById('timer').innerHTML=`<span>${s[0]}</span><span>${s[1]}</span><span>${s[2]}</span>`;
}

function startTimer(){
  if(timerInterval)return;
  timerInterval=setInterval(()=>{timerVal++;updateTimer();},1000);
}

function setFace(f){document.getElementById('faceBtn').textContent=f;}
function faceDown(){if(!gameOver&&!gameWon)setFace('😮');}
function faceUp(){if(!gameOver&&!gameWon)setFace('🙂');}

document.addEventListener('mouseup',()=>{
  leftDown=false;rightDown=false;chording=false;unpressAll();
});

window.addEventListener('resize',()=>{if(!gameOver&&!gameWon)newGame();});

updateLevelMenu();
newGame();
</script>

</body>
</html>
