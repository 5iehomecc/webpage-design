<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>扫雷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden;overflow-y:auto}
body{background:#004643;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;padding:.5rem;gap:.5rem;-webkit-user-select:none;user-select:none}
.window{background:#e8e4e6;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,30,29,.4),0 2px 8px rgba(0,0,0,.2);max-width:96vw;display:flex;flex-direction:column}
.title-bar{background:#001e1d;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.title-bar-text{font-size:.7rem;letter-spacing:1px;color:#f9bc60;font-weight:900;white-space:nowrap;display:flex;align-items:center;gap:6px}
.title-bar-text .mi{font-size:1rem;line-height:1}
.level-btns{display:flex;gap:6px}
.lb{display:inline-block;background:#004643;color:#f9bc60;padding:2px 10px;border-radius:4px;font-size:.7rem;font-weight:900;cursor:pointer;transition:background .15s;border:none;letter-spacing:1px}
.lb:hover,.lb.a{background:#f9bc60;color:#001e1d}
.info-bar{padding:6px 14px;background:#e8e4e6;border-bottom:2px solid rgba(0,30,29,.1);display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.ii{font-size:.8rem;font-weight:700;color:#001e1d;display:flex;align-items:center;gap:4px}
.ii .k{display:inline-block;background:#004643;color:#f9bc60;padding:1px 8px;border-radius:4px;font-size:.7rem;font-weight:900}
.game-area{padding:8px 10px 10px}
.panel{background:#e8e4e6;border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:2px solid rgba(0,30,29,.08)}
.ctr{background:#001e1d;color:#e16162;font-family:"Courier New",Consolas,monospace;font-size:28px;font-weight:900;width:58px;height:36px;display:flex;align-items:center;justify-content:center;letter-spacing:3px;border-radius:6px;padding:2px 4px;border:2px solid rgba(0,30,29,.3)}
.ctr span{display:inline-block;min-width:12px;text-align:center}
.fb{width:40px;height:40px;background:#e8e4e6;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;border-radius:8px;border:2px solid rgba(0,30,29,.1);transition:all .15s}
.fb:hover{background:#f9bc60;transform:scale(1.05)}
.fb:active{transform:scale(.95)}
.gw{border-radius:8px;overflow:hidden;border:3px solid rgba(0,30,29,.12);background:#e8e4e6}
.g{display:grid}
.c{background:#c7c2c4;display:flex;align-items:center;justify-content:center;font-weight:900;cursor:default;line-height:1;position:relative;border:2px solid;border-color:#f5f3f4 #8a8587 #8a8587 #f5f3f4}
.c.r{border:1px solid rgba(0,30,29,.12);background:#e8e4e6}
.c.p{border:1px solid rgba(0,30,29,.12);background:#e8e4e6}
.c.h{background:#e16162 !important}
.c.x{background:#e8e4e6}
.c.x .cr::after,.c.x .cr::before{content:'';position:absolute;background:#e16162;border-radius:2px}
.c.x .cr::after{transform:rotate(45deg)}
.c.x .cr::before{transform:rotate(-45deg)}
.n1{color:#3b82f6}.n2{color:#22c55e}.n3{color:#e16162}.n4{color:#7c3aed}.n5{color:#b91c1c}.n6{color:#0d9488}.n7{color:#001e1d}.n8{color:#9ca3af}
.ft{text-align:center;padding:.5rem 1rem;color:#abd1c6;font-size:.75rem;font-weight:400;letter-spacing:.5px;transition:font-weight .2s;white-space:nowrap}
.ft a{color:#f9bc60;text-decoration:none;font-weight:400;transition:font-weight .2s}
.ft a:hover,.ft:hover{font-weight:900}
@media(max-width:700px){
body{padding:.3rem}
.title-bar{padding:6px 10px;gap:8px}
.title-bar-text{font-size:.55rem}
.lb{font-size:.6rem;padding:1px 6px}
.info-bar{padding:4px 10px;gap:10px}
.ii{font-size:.7rem}
.ii .k{font-size:.6rem;padding:1px 5px}
.ctr{font-size:22px;width:48px;height:30px}
.fb{width:34px;height:34px;font-size:18px}
}
</style>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title-bar-text"><span class="mi">💣</span>MINESWEEPER</div>
    <div class="level-btns">
      <button class="lb a" data-l="beginner" onclick="G.L(this)">初级</button>
      <button class="lb" data-l="intermediate" onclick="G.L(this)">中级</button>
      <button class="lb" data-l="expert" onclick="G.L(this)">高级</button>
    </div>
  </div>
  <div class="info-bar">
    <div class="ii"><span class="k">左键</span>揭开</div>
    <div class="ii"><span class="k">右键</span>标旗</div>
    <div class="ii"><span class="k">双键</span>验证</div>
  </div>
  <div class="game-area">
    <div class="panel">
      <div class="ctr" id="mc"><span>0</span><span>1</span><span>0</span></div>
      <div class="fb" id="fb" onclick="G.NG()">🙂</div>
      <div class="ctr" id="tm"><span>0</span><span>0</span><span>0</span></div>
    </div>
    <div class="gw"><div class="g" id="gd"></div></div>
  </div>
</div>
<div class="ft">Copyright &copy; <a href="https://www.5iehome.cc" target="_blank">E家分享</a></div>
<script>
const G={
  LV:{beginner:{r:9,c:9,m:10},intermediate:{r:16,c:16,m:40},expert:{r:16,c:30,m:99}},
  lv:'beginner',rows:0,cols:0,mT:0,
  bd:[],rv:[],fg:[],mn:[],
  go:false,won:false,fc:true,
  tV:0,tI:null,
  lD:false,rD:false,
  chR:0,chC:0,chrd:false,
  L(btn){
    this.lv=btn.dataset.l;
    var bs=document.querySelectorAll('.lb');
    for(var i=0;i<bs.length;i++)bs[i].classList.toggle('a',bs[i].dataset.l===this.lv);
    this.NG();
  },
  NG(){
    var v=this.LV[this.lv];
    this.rows=v.r;this.cols=v.c;this.mT=v.m;
    this.bd=Array.from({length:this.rows},function(){return Array(v.c).fill(0)});
    this.rv=Array.from({length:this.rows},function(){return Array(v.c).fill(false)});
    this.fg=Array.from({length:this.rows},function(){return Array(v.c).fill(0)});
    this.mn=Array.from({length:this.rows},function(){return Array(v.c).fill(false)});
    this.go=false;this.won=false;this.fc=true;
    clearInterval(this.tI);this.tV=0;this.tI=null;
    this.lD=false;this.rD=false;this.chrd=false;
    this.uMC();this.uTM();this.SF('🙂');this.BG();
  },
  CS(){
    var vh=innerHeight,vw=innerWidth,mb=vw<=700;
    var oh=vh-(mb?32:40)-(mb?28:34)-(mb?16:18)-(mb?46:52)-6-(mb?12:16)-(mb?30:36);
    var ow=vw-48;
    var s=Math.min(Math.floor(oh/this.rows),Math.floor(ow/this.cols));
    return Math.max(18,Math.min(40,s));
  },
  BG(){
    var g=document.getElementById('gd');
    g.innerHTML='';
    var sz=this.CS();
    g.style.gridTemplateColumns='repeat('+this.cols+','+sz+'px)';
    var fs=Math.max(10,sz>>1);
    var isz=Math.max(10,sz*.55|0);
    var d=document.createDocumentFragment();
    for(var r=0;r<this.rows;r++){
      for(var c=0;c<this.cols;c++){
        var e=document.createElement('div');
        e.className='c';e.style.cssText='width:'+sz+'px;height:'+sz+'px;font-size:'+fs+'px';
        e.dataset.r=r;e.dataset.c=c;e.dataset.s=sz;
        d.appendChild(e);
      }
    }
    g.appendChild(d);
    this._sz=sz;this._fs=fs;this._isz=isz;
  },
  PM(sr,sc){
    var p=0;
    while(p<this.mT){
      var r=Math.random()*this.rows|0,c=Math.random()*this.cols|0;
      if(this.mn[r][c]||Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
      this.mn[r][c]=true;p++;
    }
    for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++){
      if(this.mn[r][c]){this.bd[r][c]=-1;continue;}
      var n=0;
      for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
        var nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.mn[nr][nc])n++;
      }
      this.bd[r][c]=n;
    }
  },
  _gd(){return document.getElementById('gd')},
  _gc(r,c){return this._gd().children[r*this.cols+c]},
  _rc(r,c){
    var e=this._gc(r,c);
    if(this.rv[r][c]){
      e.className='c r';
      if(this.bd[r][c]===-1)e.innerHTML='<span style="font-size:'+this._isz+'px">💣</span>';
      else if(this.bd[r][c]>0)e.innerHTML='<span class="n'+this.bd[r][c]+'" style="font-size:'+this._fs+'px">'+this.bd[r][c]+'</span>';
      else e.innerHTML='';
    }else{
      e.className='c';
      if(this.fg[r][c]===1)e.innerHTML='<span style="font-size:'+this._isz+'px">🚩</span>';
      else if(this.fg[r][c]===2)e.innerHTML='<span style="font-size:'+this._fs+'px;font-weight:900;color:#001e1d">?</span>';
      else e.innerHTML='';
    }
  },
  uMC(){
    var n=0;for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++)if(this.fg[r][c]===1)n++;
    var v=this.mT-n;var el=document.getElementById('mc');
    if(v<0){var s=String(-v).padStart(2,'0');el.innerHTML='<span>-</span><span>'+s[0]+'</span><span>'+s[1]+'</span>';}
    else{var s=String(v).padStart(3,'0');el.innerHTML='<span>'+s[0]+'</span><span>'+s[1]+'</span><span>'+s[2]+'</span>';}
  },
  uTM(){var s=String(Math.min(this.tV,999)).padStart(3,'0');document.getElementById('tm').innerHTML='<span>'+s[0]+'</span><span>'+s[1]+'</span><span>'+s[2]+'</span>'},
  SF(f){document.getElementById('fb').textContent=f},
  FD(){if(!this.go&&!this.won)this.SF('😮')},
  FU(){if(!this.go&&!this.won)this.SF('🙂')},
  PA(r,c){
    var gd=this._gd(),rows=this.rows,cols=this.cols;
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      var nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols){var e=gd.children[nr*cols+nc];if(!e.classList.contains('r'))e.classList.add('p');}
    }
  },
  UA(r,c){
    var gd=this._gd(),rows=this.rows,cols=this.cols;
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      var nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols)gd.children[nr*cols+nc].classList.remove('p');
    }
  },
  UPA(){var ps=document.querySelectorAll('.c.p');for(var i=0;i<ps.length;i++)ps[i].classList.remove('p')},
  _HL(r,c){
    if(this.fc){this.PM(r,c);this.fc=false;this.tI=setInterval((function(){this.tV++;this.uTM()}).bind(this),1000);}
    if(this.mn[r][c]){this.go=true;clearInterval(this.tI);this.RAM(r,c);this.SF('😵');return;}
    this.RC(r,c);this.CW();
  },
  _HR(r,c){
    if(this.rv[r][c])return;
    this.fg[r][c]=(this.fg[r][c]+1)%3;
    this._rc(r,c);this.uMC();
  },
  _CC(r,c){
    var fc=0;
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      var nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.fg[nr][nc]===1)fc++;
    }
    if(fc!==this.bd[r][c])return;
    var hit=false;
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      var nr=r+dr,nc=c+dc;
      if(nr<0||nr>=this.rows||nc<0||nc>=this.cols||this.rv[nr][nc]||this.fg[nr][nc]===1)continue;
      if(this.mn[nr][nc]){hit=true;this.go=true;clearInterval(this.tI);this.RAM(nr,nc);}
      else this.RC(nr,nc);
    }
    if(hit){this.SF('😵');return;}
    this.CW();
  },
  RC(r,c){
    if(r<0||r>=this.rows||c<0||c>=this.cols||this.rv[r][c]||this.fg[r][c]===1)return;
    this.rv[r][c]=true;this._rc(r,c);
    if(this.bd[r][c]===0){
      for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){if(dr||dc)this.RC(r+dr,c+dc);}
    }
  },
  RAM(hr,hc){
    for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++){
      var e=this._gc(r,c);
      if(this.mn[r][c]&&!this.fg[r][c]){
        this.rv[r][c]=true;
        e.className='c r'+(r===hr&&c===hc?' h':'');
        e.innerHTML='<span style="font-size:'+this._isz+'px">💣</span>';
      }
      if(!this.mn[r][c]&&this.fg[r][c]===1){
        e.className='c x';
        var cw=Math.max(10,this._sz-10),ch=Math.max(2,this._sz*.09|0);
        e.innerHTML='<span class="cr" style="width:'+cw+'px;height:'+ch+'px"></span>';
      }
    }
  },
  CW(){
    var u=0;for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++)if(!this.rv[r][c])u++;
    if(u===this.mT){
      this.won=true;clearInterval(this.tI);this.SF('😎');
      for(var r=0;r<this.rows;r++)for(var c=0;c<this.cols;c++){
        if(this.mn[r][c]&&this.fg[r][c]!==1){this.fg[r][c]=1;this._rc(r,c);}
      }
      this.uMC();
    }
  }
};

(function(){
  var gd=document.getElementById('gd');
  function cell(e){
    var t=e.target;
    if(t.dataset&&t.dataset.r!==undefined)return t;
    while(t&&t!==gd){
      if(t.className&&t.className.indexOf&&t.className.indexOf('c ')===0)return t;
      if(t.className==='c')return t;
      t=t.parentElement;
    }
    return null;
  }

  gd.addEventListener('mousedown',function(e){
    if(G.go||G.won)return;
    e.preventDefault();
    var c=cell(e);
    if(!c)return;
    var r=+c.dataset.r,cc=+c.dataset.c;
    if(e.button===0){G.lD=true;}
    if(e.button===2){G.rD=true;}
    if(e.button===2&&!G.lD){G._HR(r,cc);return;}
    if(e.button===0&&!G.rD){
      if(!G.rv[r][cc]&&G.fg[r][cc]!==1){G.FD();c.classList.add('p');}
    }
    if(G.lD&&G.rD){
      G.chrd=true;G.chR=r;G.chC=cc;
      G.PA(r,cc);
    }
  });

  gd.addEventListener('mouseup',function(e){
    if(G.go||G.won)return;
    if(e.button===0)G.lD=false;
    if(e.button===2)G.rD=false;
    if(G.chrd&&!(G.lD&&G.rD)){
      G.chrd=false;G.UPA();
      if(G.rv[G.chR][G.chC]&&G.bd[G.chR][G.chC]>0)G._CC(G.chR,G.chC);
      return;
    }
    var c=cell(e);
    if(!c)return;
    var r=+c.dataset.r,cc=+c.dataset.c;
    if(e.button===0&&!G.rD){
      G.UPA();
      if(!G.rv[r][cc]&&G.fg[r][cc]!==1)G._HL(r,cc);
      if(!G.go&&!G.won)G.FU();
    }
  });

  gd.addEventListener('mouseover',function(e){
    if(G.go||G.won)return;
    var c=cell(e);if(!c)return;
    var r=+c.dataset.r,cc=+c.dataset.c;
    if(G.lD&&!G.rD&&!G.rv[r][cc]&&G.fg[r][cc]!==1)c.classList.add('p');
    if(G.lD&&G.rD)G.PA(r,cc);
  });

  gd.addEventListener('mouseout',function(e){
    if(G.go||G.won)return;
    var c=cell(e);if(!c)return;
    var r=+c.dataset.r,cc=+c.dataset.c;
    if(G.lD&&!G.rD)c.classList.remove('p');
    if(G.lD&&G.rD)G.UA(r,cc);
  });

  gd.addEventListener('contextmenu',function(e){e.preventDefault()});
  document.addEventListener('mouseup',function(){G.lD=false;G.rD=false;G.chrd=false;G.UPA()});
  window.addEventListener('resize',function(){if(!G.go&&!G.won)G.NG()});
  var bs=document.querySelectorAll('.lb');
  for(var i=0;i<bs.length;i++)bs[i].classList.toggle('a',bs[i].dataset.l===G.lv);
  G.NG();
})();
</script>
</body>
</html>
